name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          # Set MTL_STAGING=1 here when deploying the staging branch / subdomain.
          # For production deploys, leave it unset.
          MTL_STAGING: ${{ vars.MTL_STAGING }}
        run: npm run build

      - name: Verify links
        working-directory: site
        run: npm run links:check

      - name: Deploy via SSH + tar (no SFTP needed)
        env:
          SSHPASS: ${{ secrets.SFTP_PASS }}
          REMOTE_HOST: ${{ secrets.SFTP_HOST }}
          REMOTE_USER: ${{ secrets.SFTP_USER }}
          REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          tar -czf /tmp/dist.tar.gz -C site/dist .
          ls -la /tmp/dist.tar.gz

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o ServerAliveInterval=15"

          # Step 1: upload tarball to remote /tmp via stdin redirection (NO `|` pipe — sshpass mishandles piped input)
          REMOTE_TGZ="/tmp/mtl_deploy_${GITHUB_RUN_ID}.tar.gz"
          echo "Uploading tarball to $REMOTE_TGZ ..."
          sshpass -e ssh $SSH_OPTS "$REMOTE_USER@$REMOTE_HOST" "cat > $REMOTE_TGZ" < /tmp/dist.tar.gz
          echo "Verifying upload ..."
          sshpass -e ssh $SSH_OPTS "$REMOTE_USER@$REMOTE_HOST" "ls -la $REMOTE_TGZ"

          # Step 2: extract on the server, then clean up.
          echo "Extracting into $REMOTE_DIR ..."
          sshpass -e ssh $SSH_OPTS "$REMOTE_USER@$REMOTE_HOST" \
            "set -e; mkdir -p '$REMOTE_DIR' && tar -xzf '$REMOTE_TGZ' -C '$REMOTE_DIR' && rm -f '$REMOTE_TGZ' && echo DEPLOY_OK"
