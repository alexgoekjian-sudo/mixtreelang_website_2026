name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          # Set MTL_STAGING=1 here when deploying the staging branch / subdomain.
          # For production deploys, leave it unset.
          MTL_STAGING: ${{ vars.MTL_STAGING }}
        run: npm run build

      - name: Verify links
        working-directory: site
        run: npm run links:check

      - name: Deploy via scp -O (OpenSSH legacy SCP protocol)
        env:
          SSHPASS: ${{ secrets.SFTP_PASS }}
          REMOTE_HOST: ${{ secrets.SFTP_HOST }}
          REMOTE_USER: ${{ secrets.SFTP_USER }}
          REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          mkdir -p ~/.ssh && ssh-keyscan -p 22 -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          tar -czf /tmp/dist.tar.gz -C site/dist .
          ls -la /tmp/dist.tar.gz

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

          echo "Uploading tarball..."
          sshpass -e scp -O -P 22 $SSH_OPTS /tmp/dist.tar.gz "$REMOTE_USER@$REMOTE_HOST:dist.tar.gz"

          echo "Extracting on server..."
          sshpass -e ssh -p 22 $SSH_OPTS "$REMOTE_USER@$REMOTE_HOST" \
            "set -e; mkdir -p '$REMOTE_DIR' && tar -xzf dist.tar.gz -C '$REMOTE_DIR' && rm -f dist.tar.gz && echo DEPLOY_OK"
