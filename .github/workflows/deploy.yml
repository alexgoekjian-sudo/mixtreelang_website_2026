name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          # Set MTL_STAGING=1 here when deploying the staging branch / subdomain.
          # For production deploys, leave it unset.
          MTL_STAGING: ${{ vars.MTL_STAGING }}
        run: npm run build

      - name: Verify links
        working-directory: site
        run: npm run links:check

      - name: Deploy to Plesk via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: 22
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local_path: './site/dist/*'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          sftp_only: true
          delete_remote_files: false
